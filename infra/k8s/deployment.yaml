apiVersion: apps/v1
kind: Deployment
metadata:
  name: novobanco
  namespace: default
  labels:
    app: novobanco
spec:
  replicas: 2
  selector:
    matchLabels:
      app: novobanco
  template:
    metadata:
      labels:
        app: novobanco
    spec:
      serviceAccountName: novobanco

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: novobanco

      containers:
        - name: api
          image: "${ECR_REPOSITORY_URL}:latest"
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: novobanco-db   # Kubernetes Secret poblado desde Secrets Manager
                  key: url
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: novobanco-api
                  key: key

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
